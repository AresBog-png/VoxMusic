<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VoxMusic • слушай и скачивай из всего интернета</title>
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0d0714;
            background-image: radial-gradient(circle at 15% 30%, #2c1536 0%, #0a050f 90%);
            min-height: 100vh;
            color: #ede4ff;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
        }

        /* общий контейнер */
        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ---------- HEADER / NAV ---------- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 36px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            background: linear-gradient(145deg, #b77aff, #6d28d9);
            width: 48px;
            height: 48px;
            border-radius: 16px 4px 20px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #a855f7aa, 0 4px 12px #00000050;
        }

        .logo-icon i {
            font-size: 28px;
            color: #0a0410;
            text-shadow: 0 0 6px #e9d5ff;
        }

        .logo-text {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f0e2ff, #cbb2ff, #a87ef0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #b77aff60;
        }
        .logo-text span {
            font-weight: 300;
            font-size: 1rem;
            color: #b595f0;
            margin-left: 6px;
            letter-spacing: 1px;
        }

        .search-box {
            background: #1e102bb3;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1.5px solid #7a3bb8;
            border-radius: 60px;
            padding: 8px 8px 8px 22px;
            display: flex;
            align-items: center;
            width: 340px;
            box-shadow: 0 0 18px #6d28d930, inset 0 1px 3px #ffffff1a;
        }

        .search-box i {
            color: #c49eff;
            font-size: 1.1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 14px;
            font-size: 1rem;
            color: #f5edff;
            outline: none;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #b69ad9;
            font-weight: 300;
        }

        .search-box button {
            background: #9b5de0;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0b0412;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px #b77aff;
            border: 1px solid #d8b5ff;
            font-size: 0.9rem;
        }

        .search-box button:hover {
            background: #b87bff;
            box-shadow: 0 0 18px #c084fc;
            color: #020003;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge i {
            font-size: 1.4rem;
            background: #2f1b42;
            padding: 10px;
            border-radius: 40%;
            color: #dbbaff;
            border: 1px solid #a060f0;
            box-shadow: 0 0 12px #7e3ec4;
        }

        /* ---------- categories / filter ---------- */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
        }

        .cat-btn {
            background: #1e102bcc;
            backdrop-filter: blur(8px);
            border: 1px solid #6d3f9e;
            color: #e7d5ff;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 10px #00000033;
        }

        .cat-btn i {
            margin-right: 8px;
            color: #b983ff;
        }

        .cat-btn.active {
            background: #8b4fd9;
            border-color: #d4b5ff;
            color: white;
            box-shadow: 0 0 20px #b77aff, 0 2px 8px black;
        }

        .cat-btn:hover {
            background: #4d2c72;
            border-color: #b57ef0;
        }

        /* ---------- main grid ---------- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }

        /* треки */
        .tracks-section h2 {
            font-weight: 500;
            margin-bottom: 22px;
            font-size: 1.7rem;
            border-left: 6px solid #b072f0;
            padding-left: 20px;
            text-shadow: 0 0 5px #9f5ee5;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-card {
            background: #140b1ee0;
            backdrop-filter: blur(10px);
            border: 1px solid #633c9a;
            border-radius: 22px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            transition: 0.2s;
            box-shadow: 0 8px 18px #00000040, 0 0 8px #4b277050;
        }

        .track-card:hover {
            border-color: #b77aff;
            box-shadow: 0 0 22px #8e4ec9, 0 6px 16px #000000;
            background: #1d112be0;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex: 2 1 260px;
        }

        .track-cover {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #3e235e, #1e0f2e);
            border-radius: 18px 6px 18px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #a36ef0;
            box-shadow: 0 0 10px #824fcb;
            color: #e2c5ff;
            font-size: 1.8rem;
        }

        .track-meta h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #f0e2ff;
        }

        .track-meta p {
            color: #bc9fdf;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .track-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .play-btn {
            background: #7c3aed;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 0 20px #a151e6;
            border: 1px solid #e2beff;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            background: #a868f5;
            transform: scale(1.05);
            box-shadow: 0 0 28px #c084fc;
        }

        .download-btn {
            background: transparent;
            border: 1.5px solid #7d52b8;
            color: #dcc6ff;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn i {
            font-size: 1rem;
        }

        .download-btn:hover {
            background: #673f9e;
            border-color: #cbacff;
            color: white;
            box-shadow: 0 0 16px #a572e6;
        }

        /* боковая панель */
        .player-sidebar {
            background: #13081fc0;
            backdrop-filter: blur(18px);
            border: 1.5px solid #6f42b1;
            border-radius: 38px;
            padding: 26px 20px;
            box-shadow: 0 20px 40px #00000060, 0 0 30px #571f9e30;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .now-playing {
            text-align: center;
        }

        .np-cover {
            width: 140px;
            height: 140px;
            margin: 0 auto 18px;
            background: linear-gradient(145deg, #4d2a72, #1e0e2b);
            border-radius: 30px 10px 30px 10px;
            border: 2px solid #b27cf0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px #7b44c0;
            font-size: 3.5rem;
            color: #eaceff;
        }

        .np-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .np-artist {
            color: #c7abf0;
            margin-bottom: 26px;
            font-size: 1rem;
        }

        /* кастомный плеер */
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 18px;
        }

        .ctrl-btn {
            background: #321f4b;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            color: #efdbff;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 0 14px #9652e6;
            border: 1px solid #ba93f0;
            transition: 0.1s;
        }

        .ctrl-btn:hover {
            background: #6741a3;
            box-shadow: 0 0 22px #c28aff;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #d0b3ff;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: #321e4a;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 38%;
            height: 6px;
            background: linear-gradient(90deg, #c394ff, #ac5ef0);
            border-radius: 20px;
            box-shadow: 0 0 12px #bc7af0;
        }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 10px;
        }

        .volume-row i {
            color: #cfb0ff;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            background: #2c1742;
            border-radius: 10px;
        }

        /* футер/инфо */
        .footer-note {
            margin-top: 40px;
            text-align: center;
            color: #967bb3;
            border-top: 1px dashed #592f87;
            padding-top: 24px;
            font-size: 0.9rem;
        }

        .footer-note i {
            color: #b47cf0;
            margin: 0 4px;
        }

        /* адаптив */
        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                width: 100%;
            }
        }
        @media (max-width: 480px) {
            body { padding: 16px; }
            .track-card { flex-direction: column; align-items: flex-start; }
        }

        /* вспомогательные */
        .badge {
            background: #411e66;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #e7ceff;
        }
        i {
            pointer-events: none;
        }
        button, .cat-btn {
            user-select: none;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Шапка VoxMusic -->
    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-headphones-alt"></i>
            </div>
            <div class="logo-text">
                VoxMusic <span>SOUT VEI</span>
            </div>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Искать треки, артистов, альбомы..." id="searchInput">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i> Найти</button>
        </div>
        <div class="user-badge">
            <i class="fas fa-user-astronaut"></i>
            <i class="fas fa-bolt" style="background: #6d28d9;"></i>
        </div>
    </header>

    <!-- Категории -->
    <div class="categories">
        <div class="cat-btn active"><i class="fas fa-fire"></i> Популярное</div>
        <div class="cat-btn"><i class="fas fa-chart-line"></i> Чарт</div>
        <div class="cat-btn"><i class="fas fa-microchip"></i> Электроника</div>
        <div class="cat-btn"><i class="fas fa-guitar"></i> Рок</div>
        <div class="cat-btn"><i class="fas fa-cloud-music"></i> Хип-хоп</div>
        <div class="cat-btn"><i class="fas fa-globe"></i> Новинки</div>
    </div>

    <!-- Основной контент + плеер -->
    <div class="main-grid">
        <!-- Левая часть - треки -->
        <section class="tracks-section">
            <h2><i class="fas fa-music" style="margin-right: 12px;"></i>Рекомендации из всего интернета</h2>
            <div class="track-list" id="trackListContainer">
                <!-- карточки генерируются через js, но статика уже есть -->
            </div>
        </section>

        <!-- Правая панель - плеер SOUT VEI стиль -->
        <aside class="player-sidebar">
            <div class="now-playing">
                <div class="np-cover" id="nowPlayingCover">
                    <i class="fas fa-compact-disc"></i>
                </div>
                <div class="np-title" id="nowPlayingTitle">After Hours</div>
                <div class="np-artist" id="nowPlayingArtist">The Weeknd</div>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevTrack"><i class="fas fa-backward-step"></i></button>
                <button class="ctrl-btn" id="playPauseBtn" style="width: 64px; height: 64px; font-size: 2rem;"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="nextTrack"><i class="fas fa-forward-step"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBarContainer">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <span id="durationTime">3:42</span>
            </div>
            <div class="volume-row">
                <i class="fas fa-volume-down"></i>
                <div class="volume-slider" id="volumeSliderContainer">
                    <div id="volumeFill" style="width: 70%; height: 4px; background: #b77aff; border-radius: 10px;"></div>
                </div>
                <i class="fas fa-volume-up"></i>
            </div>
            <div style="display: flex; justify-content: space-around; margin: 20px 0 6px;">
                <span class="badge"><i class="far fa-heart"></i> 320 kbps</span>
                <span class="badge"><i class="fas fa-download"></i> SOUT VEI</span>
            </div>
            <p style="text-align: center; font-size: 0.8rem; margin-top: 12px; opacity: 0.8;">
                <i class="fas fa-sync-alt"></i> Стриминг из интернета · Полное качество
            </p>
        </aside>
    </div>
    <div class="footer-note">
        <i class="fas fa-circle"></i> VoxMusic · SOUT VEI · Слушай и скачивай любую музыку · 
        <i class="fas fa-cloud-arrow-down"></i> из всего интернета <i class="fas fa-circle"></i>
    </div>
</div>

<!-- Скрытый аудио элемент -->
<audio id="audioPlayer" preload="metadata"></audio>

<script>
    (function(){
        "use strict";

        // ---------- ДЕМО-ДАННЫЕ ТРЕКОВ ----------
        const demoLibrary = [
            { 
                id: 1, title: "Blinding Lights", artist: "The Weeknd", 
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // пример аудио
                coverIcon: "fa-bolt", duration: "3:20"
            },
            { 
                id: 2, title: "Levitating", artist: "Dua Lipa", 
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                coverIcon: "fa-star", duration: "3:23"
            },
            { 
                id: 3, title: "Starboy", artist: "The Weeknd ft. Daft Punk", 
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                coverIcon: "fa-meteor", duration: "3:50"
            },
            { 
                id: 4, title: "Industry Baby", artist: "Lil Nas X", 
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                coverIcon: "fa-crown", duration: "3:32"
            },
            { 
                id: 5, title: "Save Your Tears", artist: "The Weeknd", 
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                coverIcon: "fa-droplet", duration: "3:35"
            }
        ];

        // ---------- DOM элементы ----------
        const trackContainer = document.getElementById('trackListContainer');
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevTrack');
        const nextBtn = document.getElementById('nextTrack');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');
        const nowCoverIcon = document.querySelector('#nowPlayingCover i');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationTimeSpan = document.getElementById('durationTime');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const volumeFill = document.getElementById('volumeFill');
        const volumeContainer = document.getElementById('volumeSliderContainer');

        // состояние плеера
        let currentTrackIndex = 0;
        let isPlaying = false;
        let currentVolume = 0.7;

        // рендер карточек треков
        function renderTracks() {
            let html = '';
            demoLibrary.forEach((track, idx) => {
                html += `
                    <div class="track-card" data-track-index="${idx}">
                        <div class="track-info">
                            <div class="track-cover"><i class="fas ${track.coverIcon}"></i></div>
                            <div class="track-meta">
                                <h4>${track.title}</h4>
                                <p><i class="fas fa-user-music"></i> ${track.artist} · ${track.duration}</p>
                            </div>
                        </div>
                        <div class="track-actions">
                            <button class="play-btn play-track-btn" data-index="${idx}"><i class="fas fa-play"></i></button>
                            <button class="download-btn download-track" data-index="${idx}"><i class="fas fa-download"></i> Скачать</button>
                        </div>
                    </div>
                `;
            });
            trackContainer.innerHTML = html;
        }

        // загрузить трек в плеер
        function loadTrack(index) {
            const track = demoLibrary[index];
            if (!track) return;
            audio.src = track.src;
            nowPlayingTitle.textContent = track.title;
            nowPlayingArtist.textContent = track.artist;
            nowCoverIcon.className = `fas ${track.coverIcon}`;
            currentTrackIndex = index;
            
            // сбросить прогресс
            audio.currentTime = 0;
            progressFill.style.width = '0%';
            currentTimeSpan.textContent = '0:00';
            durationTimeSpan.textContent = track.duration || '0:00';
            
            // если играло - продолжить
            if (isPlaying) {
                audio.play().catch(e => console.log('play prevented:', e));
            }
            updatePlayButton();
        }

        function playPause() {
            if (!audio.src) {
                loadTrack(0);
            }
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => {});
            }
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        function updatePlayButton() {
            const icon = playPauseBtn.querySelector('i');
            if (isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }

        function nextTrack() {
            let next = (currentTrackIndex + 1) % demoLibrary.length;
            loadTrack(next);
            if (isPlaying) audio.play().catch(e=>{});
        }

        function prevTrack() {
            let prev = (currentTrackIndex - 1 + demoLibrary.length) % demoLibrary.length;
            loadTrack(prev);
            if (isPlaying) audio.play().catch(e=>{});
        }

        // обновление времени
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeSpan.textContent = formatTime(audio.currentTime);
                if (!isNaN(audio.duration)) {
                    durationTimeSpan.textContent = formatTime(audio.duration);
                }
            }
        }

        function formatTime(sec) {
            if (isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // громкость
        function setVolume(percent) {
            currentVolume = Math.min(1, Math.max(0, percent));
            audio.volume = currentVolume;
            volumeFill.style.width = (currentVolume * 100) + '%';
        }

        // обработчики событий
        function bindEvents() {
            playPauseBtn.addEventListener('click', playPause);
            prevBtn.addEventListener('click', prevTrack);
            nextBtn.addEventListener('click', nextTrack);
            
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateProgress);
            audio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayButton();
                nextTrack(); // автоследующий
                isPlaying = true;
                audio.play().catch(e=>{});
                updatePlayButton();
            });
            
            audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });
            audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
            
            // перемотка
            progressBarContainer.addEventListener('click', (e) => {
                const rect = progressBarContainer.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });

            // громкость
            volumeContainer.addEventListener('click', (e) => {
                const rect = volumeContainer.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                setVolume(percent);
            });

            // делегирование на карточки (play / download)
            trackContainer.addEventListener('click', (e) => {
                const playBtn = e.target.closest('.play-track-btn');
                const downloadBtn = e.target.closest('.download-track');
                
                if (playBtn) {
                    const idx = playBtn.getAttribute('data-index');
                    if (idx !== null) {
                        const index = parseInt(idx, 10);
                        if (currentTrackIndex === index && audio.src) {
                            // просто play/pause
                            playPause();
                        } else {
                            loadTrack(index);
                            isPlaying = true;
                            audio.play().catch(e=>{});
                            updatePlayButton();
                        }
                    }
                }
                
                if (downloadBtn) {
                    const idx = downloadBtn.getAttribute('data-index');
                    if (idx !== null) {
                        const track = demoLibrary[parseInt(idx, 10)];
                        // Имитация скачивания: создаём ссылку
                        const a = document.createElement('a');
                        a.href = track.src;
                        a.download = `${track.artist} - ${track.title}.mp3`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        // уведомление (стиль соут вэй)
                        alert(`🎵 Скачивание "${track.title}" началось! SOUT VEI · полное качество.`);
                    }
                }
            });

            // поиск (фильтр)
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            function filterTracks() {
                const query = searchInput.value.toLowerCase().trim();
                const cards = document.querySelectorAll('.track-card');
                cards.forEach(card => {
                    const title = card.querySelector('h4')?.innerText.toLowerCase() || '';
                    const artist = card.querySelector('.track-meta p')?.innerText.toLowerCase() || '';
                    if (title.includes(query) || artist.includes(query) || query === '') {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }
            searchBtn.addEventListener('click', filterTracks);
            searchInput.addEventListener('keyup', (e) => { if(e.key==='Enter') filterTracks(); });
        }

        // инициализация
        function init() {
            renderTracks();
            setVolume(0.7);
            // загружаем первый трек по умолчанию
            loadTrack(0);
            bindEvents();
        }

        init();
    })();
</script>
</body>
</html>
