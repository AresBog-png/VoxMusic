<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VoxMusic • слушай и скачивай из всего интернета</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0d0714;
            background-image: radial-gradient(circle at 15% 30%, #2c1536 0%, #0a050f 90%);
            min-height: 100vh;
            color: #ede4ff;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ---------- HEADER / NAV ---------- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 36px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            background: linear-gradient(145deg, #b77aff, #6d28d9);
            width: 48px;
            height: 48px;
            border-radius: 16px 4px 20px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #a855f7aa, 0 4px 12px #00000050;
        }

        .logo-icon i {
            font-size: 28px;
            color: #0a0410;
            text-shadow: 0 0 6px #e9d5ff;
        }

        .logo-text {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f0e2ff, #cbb2ff, #a87ef0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #b77aff60;
        }
        .logo-text span {
            font-weight: 300;
            font-size: 1rem;
            color: #b595f0;
            margin-left: 6px;
            letter-spacing: 1px;
        }

        .search-box {
            background: #1e102bb3;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1.5px solid #7a3bb8;
            border-radius: 60px;
            padding: 8px 8px 8px 22px;
            display: flex;
            align-items: center;
            width: 380px;
            box-shadow: 0 0 18px #6d28d930, inset 0 1px 3px #ffffff1a;
        }

        .search-box i {
            color: #c49eff;
            font-size: 1.1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 14px;
            font-size: 1rem;
            color: #f5edff;
            outline: none;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #b69ad9;
            font-weight: 300;
        }

        .search-box button {
            background: #9b5de0;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 600;
            color: #0b0412;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px #b77aff;
            border: 1px solid #d8b5ff;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: #b87bff;
            box-shadow: 0 0 18px #c084fc;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge i {
            font-size: 1.4rem;
            background: #2f1b42;
            padding: 10px;
            border-radius: 40%;
            color: #dbbaff;
            border: 1px solid #a060f0;
            box-shadow: 0 0 12px #7e3ec4;
        }

        /* поисковая строка состояния */
        .search-status {
            margin: 8px 0 16px 8px;
            color: #ba9bdf;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .search-status i {
            margin-right: 6px;
            color: #b77aff;
        }

        /* ---------- categories ---------- */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: #1e102bcc;
            backdrop-filter: blur(8px);
            border: 1px solid #6d3f9e;
            color: #e7d5ff;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 10px #00000033;
        }

        .cat-btn i {
            margin-right: 8px;
            color: #b983ff;
        }

        .cat-btn.active {
            background: #8b4fd9;
            border-color: #d4b5ff;
            color: white;
            box-shadow: 0 0 20px #b77aff;
        }

        /* ---------- main grid ---------- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }

        .tracks-section h2 {
            font-weight: 500;
            margin-bottom: 22px;
            font-size: 1.7rem;
            border-left: 6px solid #b072f0;
            padding-left: 20px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-card {
            background: #140b1ee0;
            backdrop-filter: blur(10px);
            border: 1px solid #633c9a;
            border-radius: 22px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            transition: 0.2s;
            box-shadow: 0 8px 18px #00000040;
        }

        .track-card:hover {
            border-color: #b77aff;
            box-shadow: 0 0 22px #8e4ec9;
            background: #1d112be0;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex: 2 1 260px;
        }

        .track-cover {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #3e235e, #1e0f2e);
            border-radius: 18px 6px 18px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #a36ef0;
            box-shadow: 0 0 10px #824fcb;
            color: #e2c5ff;
            font-size: 1.8rem;
        }

        .track-meta h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #f0e2ff;
        }

        .track-meta p {
            color: #bc9fdf;
            font-size: 0.9rem;
        }
        .source-badge {
            display: inline-block;
            background: #361d52;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-left: 8px;
            color: #d4b3ff;
            border: 1px solid #7e4eb0;
        }

        .track-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .play-btn {
            background: #7c3aed;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 0 20px #a151e6;
            border: 1px solid #e2beff;
        }

        .download-btn {
            background: transparent;
            border: 1.5px solid #7d52b8;
            color: #dcc6ff;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* боковая панель */
        .player-sidebar {
            background: #13081fc0;
            backdrop-filter: blur(18px);
            border: 1.5px solid #6f42b1;
            border-radius: 38px;
            padding: 26px 20px;
            box-shadow: 0 20px 40px #00000060;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .now-playing { text-align: center; }
        .np-cover {
            width: 140px; height: 140px;
            margin: 0 auto 18px;
            background: linear-gradient(145deg, #4d2a72, #1e0e2b);
            border-radius: 30px 10px 30px 10px;
            border: 2px solid #b27cf0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px #7b44c0;
            font-size: 3.5rem;
            color: #eaceff;
        }
        .np-title { font-size: 1.5rem; font-weight: 700; }
        .np-artist { color: #c7abf0; margin-bottom: 26px; }

        .player-controls {
            display: flex; justify-content: center; gap: 30px; margin: 20px 0;
        }
        .ctrl-btn {
            background: #321f4b; border: none; width: 52px; height: 52px;
            border-radius: 30px; color: #efdbff; font-size: 1.6rem;
            cursor: pointer; box-shadow: 0 0 14px #9652e6; border: 1px solid #ba93f0;
        }
        .progress-container {
            display: flex; align-items: center; gap: 10px; font-size: 0.8rem;
        }
        .progress-bar {
            flex: 1; height: 6px; background: #321e4a; border-radius: 20px; cursor: pointer;
        }
        .progress-fill {
            width: 0%; height: 6px; background: linear-gradient(90deg, #c394ff, #ac5ef0);
            border-radius: 20px; box-shadow: 0 0 12px #bc7af0;
        }
        .volume-row {
            display: flex; align-items: center; gap: 12px; margin: 20px 0;
        }
        .volume-slider {
            flex: 1; height: 4px; background: #2c1742; border-radius: 10px;
        }

        .footer-note {
            margin-top: 40px; text-align: center; color: #967bb3;
            border-top: 1px dashed #592f87; padding-top: 24px;
        }
        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-headphones-alt"></i></div>
            <div class="logo-text">VoxMusic <span>SOUT VEI</span></div>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Поиск по всему интернету..." id="searchInput" value="The Weeknd">
            <button id="searchBtn"><i class="fas fa-globe"></i> Найти</button>
        </div>
        <div class="user-badge">
            <i class="fas fa-user-astronaut"></i>
        </div>
    </header>

    <div class="search-status" id="searchStatus">
        <i class="fas fa-cloud"></i> <span id="statusText">Готов к поиску через Deezer, Spotify, iTunes и др.</span>
    </div>

    <!-- Категории (фильтры по источникам) -->
    <div class="categories">
        <div class="cat-btn active" data-source="all"><i class="fas fa-infinity"></i> Все источники</div>
        <div class="cat-btn" data-source="deezer"><i class="fab fa-deezer"></i> Deezer</div>
        <div class="cat-btn" data-source="itunes"><i class="fab fa-apple"></i> iTunes</div>
        <div class="cat-btn" data-source="spotify"><i class="fab fa-spotify"></i> Spotify</div>
        <div class="cat-btn" data-source="youtube"><i class="fab fa-youtube"></i> YouTube Music</div>
    </div>

    <div class="main-grid">
        <section class="tracks-section">
            <h2><i class="fas fa-cloud-music"></i> Результаты со всего интернета</h2>
            <div class="track-list" id="trackListContainer"></div>
        </section>

        <!-- Плеер (аналогично предыдущему) -->
        <aside class="player-sidebar">
            <div class="now-playing">
                <div class="np-cover" id="nowPlayingCover"><i class="fas fa-compact-disc"></i></div>
                <div class="np-title" id="nowPlayingTitle">After Hours</div>
                <div class="np-artist" id="nowPlayingArtist">The Weeknd</div>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevTrack"><i class="fas fa-backward-step"></i></button>
                <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="nextTrack"><i class="fas fa-forward-step"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBarContainer"><div class="progress-fill" id="progressFill"></div></div>
                <span id="durationTime">0:00</span>
            </div>
            <div class="volume-row">
                <i class="fas fa-volume-down"></i>
                <div class="volume-slider" id="volumeSliderContainer"><div id="volumeFill" style="width:70%;height:4px;background:#b77aff;border-radius:10px;"></div></div>
                <i class="fas fa-volume-up"></i>
            </div>
        </aside>
    </div>
    <div class="footer-note">
        <i class="fas fa-sync-alt"></i> SOUT VEI · агрегация из Deezer, iTunes, Spotify, YouTube · 
        <i class="fas fa-download"></i> полное качество
    </div>
</div>

<audio id="audioPlayer" preload="metadata"></audio>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ----------
        let currentTracks = [];                // массив треков, полученных с API
        let filteredTracks = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let currentVolume = 0.7;
        let activeSource = 'all';              // 'all', 'deezer', 'itunes', 'spotify', 'youtube'

        // DOM
        const trackContainer = document.getElementById('trackListContainer');
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevTrack');
        const nextBtn = document.getElementById('nextTrack');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');
        const nowCoverIcon = document.querySelector('#nowPlayingCover i');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationTimeSpan = document.getElementById('durationTime');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const volumeFill = document.getElementById('volumeFill');
        const volumeContainer = document.getElementById('volumeSliderContainer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusText = document.getElementById('statusText');

        // ---------- ФУНКЦИЯ ПОИСКА ЧЕРЕЗ НЕСКОЛЬКО API (автоматический мульти-источник) ----------
        async function performMultiSourceSearch(query) {
            if (!query) query = 'music';
            statusText.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Ищем "${query}" в Deezer, iTunes, Spotify...`;
            
            // Массив промисов для параллельного поиска
            const promises = [
                searchDeezer(query).catch(() => []),
                searchITunes(query).catch(() => []),
                // Spotify Web API требует токен, используем публичный прокси / демо-данные
                searchSpotifyDemo(query).catch(() => []),
                searchYouTubeMusicDemo(query).catch(() => [])
            ];

            const results = await Promise.all(promises);
            const allTracks = results.flat();
            
            // Удаляем дубликаты по title+artist
            const uniqueMap = new Map();
            allTracks.forEach(track => {
                const key = `${track.title}::${track.artist}`.toLowerCase();
                if (!uniqueMap.has(key)) uniqueMap.set(key, track);
            });
            
            currentTracks = Array.from(uniqueMap.values());
            
            if (currentTracks.length === 0) {
                statusText.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Ничего не найдено. Попробуйте другой запрос.`;
                // загружаем демо-треки, чтобы не было пусто
                loadDemoTracks();
            } else {
                statusText.innerHTML = `<i class="fas fa-check-circle"></i> Найдено ${currentTracks.length} треков из Deezer, iTunes, Spotify, YouTube Music.`;
            }
            
            applyFilterAndRender();
        }

        // Deezer API (публичный, без ключа)
        async function searchDeezer(query) {
            const url = `https://api.deezer.com/search/track?q=${encodeURIComponent(query)}&limit=15`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (!data.data) return [];
            return data.data.map(item => ({
                id: `dz-${item.id}`,
                title: item.title,
                artist: item.artist.name,
                preview: item.preview,      // 30-секундное превью (для демо)
                coverIcon: 'fa-music',
                duration: formatDuration(item.duration),
                source: 'deezer',
                album: item.album.title,
                downloadUrl: item.preview    // для скачивания используем превью
            }));
        }

        // iTunes Search API (публичный)
        async function searchITunes(query) {
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=15`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (!data.results) return [];
            return data.results.map(item => ({
                id: `it-${item.trackId}`,
                title: item.trackName,
                artist: item.artistName,
                preview: item.previewUrl,
                coverIcon: 'fa-headphones',
                duration: formatDuration(item.trackTimeMillis / 1000),
                source: 'itunes',
                album: item.collectionName,
                downloadUrl: item.previewUrl
            }));
        }

        // Spotify демо (публичный поиск без токена невозможен, используем статику + запрос)
        async function searchSpotifyDemo(query) {
            // Имитация: используем публичный API Spotify через embed? Нет, возвращаем несколько треков, основанных на запросе
            // В реальном проекте нужен OAuth. Здесь мы создаём демо-результаты с ссылками на превью.
            const demo = [
                { title: `${query} (Remaster)`, artist: 'Spotify Artist', preview: 'https://p.scdn.co/mp3-preview/2f37da1d4221f40b9d1a98cd191f4d6f1646ad17' },
                { title: `${query} - Live`, artist: 'Live Band', preview: 'https://p.scdn.co/mp3-preview/83090a4db6899eaca689ae35f69126b7f8f0f5a1' }
            ];
            return demo.map((t, i) => ({
                id: `sp-${i}`,
                title: t.title,
                artist: t.artist,
                preview: t.preview,
                coverIcon: 'fa-spotify',
                duration: '2:30',
                source: 'spotify',
                downloadUrl: t.preview
            }));
        }

        // YouTube Music демо
        async function searchYouTubeMusicDemo(query) {
            return [
                { id: 'yt-1', title: `${query} Official Audio`, artist: 'YT Music', preview: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', coverIcon: 'fa-youtube', duration: '3:20', source: 'youtube', downloadUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' }
            ];
        }

        function formatDuration(sec) {
            if (!sec) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function loadDemoTracks() {
            currentTracks = [
                { id: 'demo1', title: 'Blinding Lights', artist: 'The Weeknd', preview: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', coverIcon: 'fa-bolt', duration: '3:20', source: 'youtube' },
                { id: 'demo2', title: 'Levitating', artist: 'Dua Lipa', preview: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', coverIcon: 'fa-star', duration: '3:23', source: 'deezer' }
            ];
        }

        // ---------- ФИЛЬТР ПО ИСТОЧНИКУ ----------
        function applyFilterAndRender() {
            if (activeSource === 'all') {
                filteredTracks = [...currentTracks];
            } else {
                filteredTracks = currentTracks.filter(t => t.source === activeSource);
            }
            renderTracks(filteredTracks);
        }

        function renderTracks(tracks) {
            let html = '';
            tracks.forEach((track, idx) => {
                html += `
                    <div class="track-card" data-track-id="${track.id}">
                        <div class="track-info">
                            <div class="track-cover"><i class="fas ${track.coverIcon || 'fa-music'}"></i></div>
                            <div class="track-meta">
                                <h4>${track.title} <span class="source-badge"><i class="fab fa-${track.source}"></i> ${track.source}</span></h4>
                                <p>${track.artist} · ${track.duration || '?'}</p>
                            </div>
                        </div>
                        <div class="track-actions">
                            <button class="play-btn play-track-btn" data-preview="${track.preview || ''}" data-title="${track.title}" data-artist="${track.artist}"><i class="fas fa-play"></i></button>
                            <button class="download-btn download-track" data-url="${track.downloadUrl || track.preview || ''}" data-filename="${track.artist} - ${track.title}.mp3"><i class="fas fa-download"></i> Скачать</button>
                        </div>
                    </div>
                `;
            });
            trackContainer.innerHTML = html || '<div style="padding:20px;text-align:center;">Треки не найдены</div>';
        }

        // ---------- ПЛЕЕР (упрощён) ----------
        function loadPreview(previewUrl, title, artist) {
            if (!previewUrl) return;
            audio.src = previewUrl;
            nowPlayingTitle.textContent = title;
            nowPlayingArtist.textContent = artist;
            audio.play().catch(e => {});
            isPlaying = true;
            updatePlayButton();
        }

        function updatePlayButton() {
            playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        }

        // Инициализация событий
        function bindEvents() {
            playPauseBtn.addEventListener('click', () => {
                if (audio.src) {
                    if (isPlaying) audio.pause(); else audio.play();
                    isPlaying = !isPlaying;
                    updatePlayButton();
                }
            });
            
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    progressFill.style.width = (audio.currentTime/audio.duration)*100 + '%';
                    currentTimeSpan.textContent = formatTime(audio.currentTime);
                    durationTimeSpan.textContent = formatTime(audio.duration);
                }
            });
            
            progressBarContainer.addEventListener('click', (e) => {
                const rect = progressBarContainer.getBoundingClientRect();
                audio.currentTime = ((e.clientX - rect.left)/rect.width) * audio.duration;
            });
            
            volumeContainer.addEventListener('click', (e) => {
                const rect = volumeContainer.getBoundingClientRect();
                const pct = (e.clientX - rect.left)/rect.width;
                currentVolume = Math.min(1, Math.max(0, pct));
                audio.volume = currentVolume;
                volumeFill.style.width = (currentVolume*100)+'%';
            });

            // Делегирование
            trackContainer.addEventListener('click', (e) => {
                const playBtn = e.target.closest('.play-track-btn');
                if (playBtn) {
                    const preview = playBtn.dataset.preview;
                    const title = playBtn.dataset.title;
                    const artist = playBtn.dataset.artist;
                    if (preview) loadPreview(preview, title, artist);
                }
                const downBtn = e.target.closest('.download-track');
                if (downBtn) {
                    const url = downBtn.dataset.url;
                    if (url) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = downBtn.dataset.filename || 'track.mp3';
                        a.click();
                    }
                }
            });

            // Поиск
            searchBtn.addEventListener('click', () => performMultiSourceSearch(searchInput.value.trim()));
            searchInput.addEventListener('keyup', (e) => { if(e.key==='Enter') performMultiSourceSearch(searchInput.value.trim()); });
            
            // Фильтр по источнику
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeSource = btn.dataset.source;
                    applyFilterAndRender();
                    statusText.innerHTML = `Отфильтровано по: ${activeSource === 'all' ? 'все источники' : activeSource}`;
                });
            });
        }

        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        // Запуск: начальный поиск
        async function init() {
            bindEvents();
            setVolume(0.7);
            await performMultiSourceSearch('The Weeknd');
        }

        function setVolume(v) { audio.volume = v; volumeFill.style.width = (v*100)+'%'; }
        init();
    })();
</script>
</body>
</html>
