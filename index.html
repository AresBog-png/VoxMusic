<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VozMusic | слушать и скачивать музыку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* лёгкий акцент стиля, но текст можно копировать */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #020105);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Montserrat', sans-serif;
            color: #f0eef7;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* фиолетовое свечение */
        .glow-text {
            text-shadow: 0 0 6px #b77eff, 0 0 2px #9b4dff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* хедер в стиле VozMusic */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        .hero h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #e0b3ff, #8a2be2, #2e0a4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #8a2be2;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            border-left: 3px solid #aa5eff;
            display: inline-block;
            padding-left: 1rem;
            font-weight: 300;
            backdrop-filter: blur(2px);
        }

        /* панель поиска / фильтрация */
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .search-bar input {
            background: #1a1025;
            border: 1px solid #5a2d8c;
            padding: 0.9rem 1.5rem;
            width: 320px;
            border-radius: 60px;
            color: #f2eaff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .search-bar input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px #9f4dff;
            background: #0e0718;
        }
        .search-bar input::placeholder {
            color: #8a6eb0;
        }
        .search-bar button {
            background: linear-gradient(95deg, #3c1c5e, #1e0a2f);
            border: none;
            padding: 0 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            color: #e6d5ff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid #7c3aed;
        }
        .search-bar button:hover {
            background: linear-gradient(95deg, #5f2e8a, #321753);
            box-shadow: 0 0 10px #b77eff;
            color: white;
        }

        /* сетка треков */
        .track-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        /* карточка трека — чёрно-фиолетовый глянец */
        .track-card {
            background: rgba(12, 8, 20, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem;
            border: 1px solid #4a2b78;
            transition: transform 0.2s ease, box-shadow 0.2s;
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.6);
        }
        .track-card:hover {
            transform: translateY(-6px);
            border-color: #b87cff;
            box-shadow: 0 20px 30px -12px #4a1d9e40;
            background: rgba(18, 10, 30, 0.85);
        }
        .track-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .track-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0e9ff, #cdadff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .track-artist {
            font-size: 0.9rem;
            color: #bda3e6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .track-artist::before {
            content: "✦";
            font-size: 0.7rem;
            color: #b77eff;
        }
        .audio-player {
            width: 100%;
            margin: 0.8rem 0;
            height: 38px;
            border-radius: 30px;
        }
        audio {
            width: 100%;
            border-radius: 40px;
            background: #1f122f;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1f122f;
        }
        .track-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            gap: 0.5rem;
        }
        .btn-download, .btn-share {
            background: #221c30;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #decbff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
            border: 0.5px solid #673ab7;
        }
        .btn-download:hover, .btn-share:hover {
            background: #5c31a0;
            color: white;
            border-color: #b77eff;
            box-shadow: 0 0 6px #b77eff;
        }
        .btn-download:active, .btn-share:active {
            transform: scale(0.96);
        }

        /* тост уведомление */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c0d2bdd;
            backdrop-filter: blur(16px);
            border-left: 6px solid #bc7aff;
            padding: 12px 28px;
            border-radius: 50px;
            color: #f0e6ff;
            font-weight: 500;
            z-index: 1000;
            font-size: 0.9rem;
            pointer-events: none;
            transition: opacity 0.2s;
            box-shadow: 0 0 20px #7e3bd2;
        }

        /* футер */
        .footer-note {
            text-align: center;
            margin-top: 4rem;
            padding: 1rem;
            border-top: 1px dashed #633d9e;
            font-size: 0.8rem;
            color: #998bc7;
        }

        /* адаптив */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem;
            }
            .hero h1 {
                font-size: 2.8rem;
                letter-spacing: 3px;
            }
            .track-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>ＶＯＺＭＵＳＩＣ</h1>
        <p class="glow-text">♫  голос музыки · скачай всё, что звучит ♫</p>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Исполнитель, трек или настроение...  ✦" autocomplete="off">
        <button id="searchBtn">⟡ НАЙТИ ⟡</button>
    </div>

    <div id="trackContainer" class="track-grid">
        <!-- динамически загруженные треки -->
    </div>
    <div class="footer-note">
        🎧 VozMusic — слушай без границ. Любая музыка из открытых источников. Скачивай одним нажатием.
    </div>
</div>

<script>
    // ---------- МУЗЫКАЛЬНАЯ БАЗА "VozMusic" ----------
    // Здесь представлена коллекция из разных жанров. Адреса треков — реальные публичные демо-ссылки (free music archive style)
    // Для демонстрации работоспособности скачивания/прослушивания используются публичные треки с корректными CORS-заголовками (разрешены)
    // Можно добавлять любые URL из интернета (прямые ссылки на mp3, ogg, wav)
    const musicCatalog = [
        { id: 1, title: "Сумеречный дрифт", artist: "VozMusic", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "" },
        { id: 2, title: "Фиолетовый туман", artist: "NV", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "" },
        { id: 3, title: "Electric Noir", artist: "Phantom Pulse", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "" },
        { id: 4, title: "Глубокий басс", artist: "Luna 97", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "" },
        { id: 5, title: "Rave in the Void", artist: "Neon Crypt", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", cover: "" },
        { id: 6, title: "Стеклянные сны", artist: "Mirrorwaves", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", cover: "" },
        { id: 7, title: "Purple Rain (cover)", artist: "Soul Vibe", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", cover: "" },
        { id: 8, title: "Midnight Drift", artist: "VozMusic", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", cover: "" },
        { id: 9, title: "Киберпанк 2077", artist: "Neon Sector", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", cover: "" },
        { id: 10, title: "Last Echo", artist: "Dawn of Shadows", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", cover: "" }
    ];

    // Дополнительные треки для разнообразия (ещё 5 разных источников, чтобы показать «из всего интернета»)
    const extraTracks = [
        { id: 11, title: "Lost in Violet", artist: "Ethernal", url: "https://upload.wikimedia.org/wikipedia/commons/4/49/Beethovens_5th_Symphony_2nd_movement.ogg", cover: "" },
        { id: 12, title: "Lofi Noir", artist: "Purple Cat", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3", cover: "" },
        { id: 13, title: "Shadow Dance", artist: "MV", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3", cover: "" },
        { id: 14, title: "Город в огнях", artist: "VozMusic", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3", cover: "" },
        { id: 15, title: "Ночной экспресс", artist: "Void Walker", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3", cover: "" }
    ];

    let fullTrackList = [...musicCatalog, ...extraTracks];
    let currentFiltered = [...fullTrackList];

    // Элементы DOM
    const trackContainer = document.getElementById("trackContainer");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");

    // функция показа тостов
    function showToast(message, duration = 2500) {
        let existingToast = document.querySelector(".toast-msg");
        if(existingToast) existingToast.remove();
        const toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            if(toast) toast.style.opacity = "0";
            setTimeout(() => toast?.remove(), 400);
        }, duration);
    }

    // Скачивание трека по URL + красивое имя
    async function downloadTrack(track) {
        const url = track.url;
        const filename = `${track.artist} - ${track.title}.mp3`;
        try {
            // Пробуем fetch и преобразование в blob для максимальной совместимости скачивания
            const response = await fetch(url, { mode: 'cors' });
            if (!response.ok) throw new Error(`Ошибка загрузки: ${response.status}`);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
            showToast(`✅ Скачано: ${track.title} — ${track.artist}`);
        } catch (err) {
            console.warn(err);
            // fallback: если fetch не сработал из-за CORS / политики, попробуем открыть ссылку в новом окне как прямое скачивание?
            // для большинства публичных mp3 можно предложить сохранить как
            showToast(`⚠️ Не удалось загрузить через fetch, но можно сохранить ссылкой.`, 2000);
            // альтернативный вариант: предложить скачать через прямой переход
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.target = "_blank";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    // Поделиться треком (копировать ссылку)
    function shareTrack(track) {
        const shareText = `🎵 VozMusic: "${track.title}" — ${track.artist} Слушай здесь: ${track.url}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(shareText).then(() => {
                showToast(`🔗 Ссылка на трек скопирована! "${track.title}"`);
            }).catch(() => {
                prompt("Скопируйте ссылку на трек вручную:", shareText);
            });
        } else {
            prompt("Скопируйте информацию о треке:", shareText);
        }
    }

    // Рендер сетки треков
    function renderTracks(tracksArray) {
        if (!trackContainer) return;
        if (tracksArray.length === 0) {
            trackContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#140b1f80; border-radius:2rem;">🌀 Ничего не найдено... измени запрос, VozMusic знает больше 🌀</div>`;
            return;
        }
        const html = tracksArray.map(track => `
            <div class="track-card" data-id="${track.id}">
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                    <audio class="audio-player" controls preload="metadata">
                        <source src="${track.url}" type="audio/mpeg">
                        <source src="${track.url}" type="audio/ogg">
                        Ваш браузер не поддерживает аудио.
                    </audio>
                    <div class="track-actions">
                        <button class="btn-download" data-id="${track.id}" data-url="${track.url}" data-title="${escapeHtml(track.title)}" data-artist="${escapeHtml(track.artist)}">⬇️ СКАЧАТЬ</button>
                        <button class="btn-share" data-id="${track.id}" data-url="${track.url}" data-title="${escapeHtml(track.title)}" data-artist="${escapeHtml(track.artist)}">⟳ ПОДЕЛИТЬСЯ</button>
                    </div>
                </div>
            </div>
        `).join('');
        trackContainer.innerHTML = html;

        // привязка событий к кнопкам после рендера
        document.querySelectorAll('.btn-download').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const track = fullTrackList.find(t => t.id === id);
                if (track) downloadTrack(track);
                else {
                    // fallback на атрибуты
                    const fallbackTrack = {
                        title: btn.getAttribute('data-title'),
                        artist: btn.getAttribute('data-artist'),
                        url: btn.getAttribute('data-url')
                    };
                    downloadTrack(fallbackTrack);
                }
            });
        });

        document.querySelectorAll('.btn-share').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const track = fullTrackList.find(t => t.id === id);
                if (track) shareTrack(track);
                else {
                    const fallbackTrack = {
                        title: btn.getAttribute('data-title'),
                        artist: btn.getAttribute('data-artist'),
                        url: btn.getAttribute('data-url')
                    };
                    shareTrack(fallbackTrack);
                }
            });
        });
    }

    // простейший эскейп для защиты от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // фильтрация по поиску (исполнитель, название)
    function filterTracks(searchTerm) {
        if (!searchTerm.trim()) {
            currentFiltered = [...fullTrackList];
        } else {
            const term = searchTerm.trim().toLowerCase();
            currentFiltered = fullTrackList.filter(track =>
                track.title.toLowerCase().includes(term) ||
                track.artist.toLowerCase().includes(term)
            );
        }
        renderTracks(currentFiltered);
    }

    // обработчики поиска
    function handleSearch() {
        const query = searchInput.value;
        filterTracks(query);
        if(query.trim() !== "") {
            showToast(`🔎 Поиск: "${query}" — ${currentFiltered.length} результатов`, 1800);
        } else {
            showToast(`✨ Показана вся коллекция VozMusic`, 1300);
        }
    }

    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') handleSearch();
    });

    // Инициализация: показываем все треки
    renderTracks(fullTrackList);

    // Дополнительный фиолетовый стиль для плеера через небольшую инъекцию стилей (чтобы аудио контролы были в стиле)
    const styleInject = document.createElement('style');
    styleInject.textContent = `
        audio::-webkit-media-controls-panel {
            background-color: #251a34 !important;
            border-radius: 30px;
        }
        audio::-webkit-media-controls-play-button {
            background-color: #aa66ff;
            border-radius: 50%;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #e2caff;
        }
        audio::-webkit-media-controls-timeline {
            background-color: #482e6e;
            border-radius: 10px;
        }
    `;
    document.head.appendChild(styleInject);

    // Демонстрация "из всего интернета" — при желании пользователь может добавлять свои ссылки через консоль, но суть в том, что мы показали разные источники.
    // Добавляем скрытое сообщение в консоль для продвинутых: инструкция добавления своего трека.
    console.log("%c✨ VozMusic | Добавь свою музыку: fullTrackList.push({ id: Date.now(), title: 'Название', artist: 'Исполнитель', url: 'ПРЯМАЯ_ССЫЛКА_MP3' }); затем отфильтруй/обнови поиск ✨", "color: #bf7aff; font-size: 12px;");

    // Бонус: если нужно вставить ссылку из любого URL, мы можем дать подсказку через "поделиться" но основной функционал:
    // Также добавим глобальную возможность для расширения каталога (имитация сторонних треков)
    window.VozMusicAPI = {
        addTrack: (title, artist, url) => {
            if(!title || !artist || !url) { showToast("❌ Заполни все поля: название, исполнитель, ссылка"); return false; }
            const newId = Date.now();
            const newTrack = { id: newId, title: String(title), artist: String(artist), url: String(url) };
            fullTrackList.push(newTrack);
            filterTracks(searchInput.value);
            showToast(`➕ Добавлен трек: ${title} — ${artist}`, 2000);
            return true;
        }
    };
    // Небольшая подсказка для разработчика/энтузиаста
    console.log("🎵 Используй window.VozMusicAPI.addTrack('Название', 'Исполнитель', 'https://ссылка.mp3') чтобы добавить любой трек из интернета");
</script>
</body>
</html>
